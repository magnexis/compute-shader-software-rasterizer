name: build-release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_demo: ON
            package_name: woah-man-windows
          - os: ubuntu-latest
            build_demo: OFF
            package_name: woah-man-ubuntu
          - os: macos-latest
            build_demo: OFF
            package_name: woah-man-macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S . -B build -DWOAH_MAN_BUILD_DEMO=${{ matrix.build_demo }} -DWOAH_MAN_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Install glslang on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y glslang-tools

      - name: Install glslang on macOS
        if: runner.os == 'macOS'
        run: brew install glslang

      - name: Compile optimized SPIR-V shader blobs
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts/shaders
          for entry in CS_Clear CS_TransformVertices CS_SetupAndCull CS_BinTriangles CS_FineRasterize CS_Present; do
            glslangValidator -D -V -S comp -e "$entry" shaders/ComputeSoftwareRasterizer.hlsl -o "artifacts/shaders/${entry}.spv"
          done

      - name: Compile optimized DXIL shader blobs
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/shaders | Out-Null
          $dxc = Get-Command dxc.exe -ErrorAction SilentlyContinue
          if (-not $dxc) {
            Write-Host "dxc.exe not found on PATH, skipping DXIL blob generation."
            exit 0
          }
          $entries = "CS_Clear","CS_TransformVertices","CS_SetupAndCull","CS_BinTriangles","CS_FineRasterize","CS_Present"
          foreach ($entry in $entries) {
            & $dxc.Source -T cs_6_6 -E $entry -O3 -Fo "artifacts/shaders/$entry.dxil" "shaders/ComputeSoftwareRasterizer.hlsl"
          }

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p package
          cp README.md CONTRIBUTING.md todo .gitignore package/ || true
          cp -R shaders src docs package/
          if [ -f build/Release/woah_man.exe ]; then cp build/Release/woah_man.exe package/; fi
          if [ -d artifacts ]; then cp -R artifacts package/; fi
          tar -czf "${{ matrix.package_name }}.tar.gz" package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: |
            ${{ matrix.package_name }}.tar.gz
            package

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          {
            echo "body<<EOF"
            echo "## Compute Software Rasterizer Release"
            echo
            echo "- Automated multi-platform packaging completed"
            echo "- Shader blobs were generated when the platform tooling was available"
            echo "- See attached artifacts for binaries, source snapshot, and shader outputs"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: release-artifacts/**/*
